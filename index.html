<!DOCTYPE html>

<meta charset="UTF-8">
<title>アイプリカード管理</title>

<style>
body { font-family: sans-serif; background: #f5f5f5; padding: 10px; }

#cardList {
  display: flex;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 10px;
  margin: 8px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 120px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100px;
  border-radius: 8px;
}

.card-name {
  font-size: 12px;
  text-align: center;
  margin-top: 5px;
}

.card-info {
  font-size: 11px;
  color: #666;
}

.card.owned {
  border: 3px solid gold;
  background: #fff8dc;
}

select, input {
  margin: 5px 5px 10px 0;
  padding: 5px;
}
  /* ホバーで浮く */
.card:hover {
  transform: scale(1.08);
  cursor: pointer;
  transition: 0.2s;
}

/* 所持済みを光らせる */
.card.owned {
  border: 3px solid gold;
  background: #fff8dc;
  box-shadow: 0 0 12px gold;
}

/* レアリティ色（★4） */
.card-info {
  font-weight: bold;
}

.card-info::before {
  content: "";
}

/* ちょいアニメーション */
.card {
  transition: 0.2s;
}
  .card img {
  transition: 0.2s;
}

.card:hover img {
  transform: scale(1.05);
}
</style>
</head>

<body>

<p>所持率: <span id="rate">0%</span></p>

<select id="seriesFilter" onchange="render()">
  <option value="all">全弾</option>
  <option value="1弾">1弾</option>
</select>

let owned = JSON.parse(localStorage.getItem("owned") || "{}");

function render() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";

  const seriesFilter = document.getElementById("seriesFilter").value;
  const filter = document.getElementById("filter").value;
  const rarityFilter = document.getElementById("rarityFilter").value;
 const search = document.getElementById("search").value;
  let count = 0;
  let total = 0;

  cards.forEach(card => {
    if (seriesFilter !== "all" && card.series !== seriesFilter) return;
    if (filter !== "all" && card.char !== filter) return;
    if (rarityFilter !== "all" && card.rarity != rarityFilter) return;
    if (search) {
  const s = search.replace(/\s/g, "");
  const n = card.name.replace(/\s/g, "");
  if (!n.includes(s)) return;
}

    total++;

    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => toggle(card.id);

    if (owned[card.id]) {
      count++;
      div.classList.add("owned");
    }

    div.innerHTML =
      (card.img ? '<img src="' + card.img + '">' : '') +
      '<div class="card-info">★' + card.rarity + ' ' + card.char + '</div>' +
      '<div class="card-name">' + card.name + '</div>';

    list.appendChild(div);
  });

  const rate = total ? Math.round((count / total) * 100) : 0;
  document.getElementById("rate").textContent = rate + "%";
}

function toggle(id) {
  owned[id] = !owned[id];
  localStorage.setItem("owned", JSON.stringify(owned));
  render();
}
