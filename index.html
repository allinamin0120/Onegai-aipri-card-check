<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 10px;
}

/* 共通（PC） */
#cardList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%; /* ←変更 */
  margin: 0;   /* ←追加 */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  box-sizing: border-box;
}


.card-name {
  font-size: 12px;
  text-align: center;
  margin-top: 5px;
}

.card-info {
  font-size: 11px;
  color: #666;
}

.card.owned {
  border: 3px solid gold;
  background: #fff8dc;
}

select, input {
  margin: 5px 5px 10px 0;
  padding: 5px;
}
  /* ホバーで浮く */
.card:hover {
  transform: scale(1.08);
  cursor: pointer;
  transition: 0.2s;
}

/* 所持済みを光らせる */
.card.owned {
  border: 3px solid gold;
  background: #fff8dc;
  box-shadow: 0 0 12px gold;
}

/* レアリティ色（★4） */
.card-info {
  font-weight: bold;
}

.card-info::before {
  content: "";
}

/* ちょいアニメーション */
.card {
  transition: 0.2s;
}
 .card img {
  width: 100%;
  height: auto;
}
.card:hover img {
  transform: scale(1.05);
}
  /* PCだけホバー有効（スマホ無効） */
@media (hover: hover) {
  .card:hover {
    transform: scale(1.15);
    z-index: 10;
  }
}
  @media (hover: hover) {
  .card:hover {
    transform: scale(1.15);
    z-index: 10;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }
}
@media (max-width: 600px) {

  body {
    padding: 8px;
  }

  #cardList {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card {
    width: 100%;
    margin: 0;
  }

}
   body {
    margin: 0;
  }

  
  /* ハンバーガー */
  #menuButton {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 26px;
    z-index: 9999;
    cursor: pointer;
  }

  /* メニュー */
  #sideMenu {
  position: fixed;
  top: 0;
  left: -280px;
  width: 260px;
  height: 100%;
  background: #fff;
  transition: left 0.3s;
  z-index: 9998; 
}

  #sideMenu.open {
    left: 0;
  }

  /* オーバーレイ */
  #overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none; 
  z-index: 9997;
}

#overlay.open {
  opacity: 1;
  pointer-events: auto; 
}

let owned = JSON.parse(localStorage.getItem("owned") || "{}");

function render() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";

  const seriesFilter = document.getElementById("seriesFilter").value;
  const filter = document.getElementById("filter").value;
  const rarityFilter = document.getElementById("rarityFilter").value;
  const search = document.getElementById("search").value.toLowerCase().replace(/\s/g, "");
  const onlyUnowned = document.getElementById("onlyUnowned").checked;
  const onlyOwned = document.getElementById("onlyOwned").checked;
  let totalAll = cards.length;
let countAll = 0;

cards.forEach(card => {
  if (owned[card.id]) countAll++;
});
  let count = 0;
  let total = 0;

  cards.forEach(card => {
    if (seriesFilter !== "all" && card.series !== seriesFilter) return;
    if (filter !== "all" && card.char !== filter) return;
    if (rarityFilter !== "all" && card.rarity != rarityFilter) return;
    if (search) {
  const name = card.name.toLowerCase().replace(/\s/g, "");
  const char = card.char.toLowerCase();
  if (!name.includes(search) && !char.includes(search)) return;
}
    if (onlyUnowned && owned[card.id]) return;
    if (onlyOwned && !owned[card.id]) return;

    total++;

    const div = document.createElement("div");
    div.className = "card";

div.onclick = () => toggle(card.id);

if (owned[card.id]) {
  count++;
  div.classList.add("owned");
}

div.innerHTML =
  (card.img ? '<img src="' + card.img + '">' : '') +
  '<div class="card-info">★' + card.rarity + ' ' + card.char + '</div>' +
  '<div class="card-name">' + card.name + '</div>';


    list.appendChild(div);
  });

const rate = totalAll ? Math.round((countAll / totalAll) * 100) : 0;
document.getElementById("rate").textContent = rate + "% (" + countAll + " / " + totalAll + ")";
}


  

function toggle(id) {
  owned[id] = !owned[id];
  localStorage.setItem("owned", JSON.stringify(owned));
  render();
}
  function toggleFilter(type) {
  const unowned = document.getElementById("onlyUnowned");
  const owned = document.getElementById("onlyOwned");

  if (type === "unowned" && unowned.checked) {
    owned.checked = false;
  }

  if (type === "owned" && owned.checked) {
    unowned.checked = false;
  }

  render();
}

function exportData() {
  let ownedIds = cards
    .filter(card => owned[card.id])
    .map(card => card.id)
    .join(",");

  if (!ownedIds) {
    alert("まだカードが登録されてないよ！");
    return;
  }

  let encoded = btoa(ownedIds);

  let url = location.origin + location.pathname + "?data=" + encoded;

  navigator.clipboard.writeText(url).then(() => {
    alert("URLコピーしたよ！");
  });
}

function importData() {
  let data = prompt("復元コードまたはURLを貼ってね");
  if (!data) return;

  try {
    // 🔥 URL対応
    if (data.includes("data=")) {
      data = data.split("data=")[1];
    }

    let decoded = atob(data);
    let ids = decoded ? decoded.split(",") : [];

    let newOwned = {};
    ids.forEach(id => {
      newOwned[id] = true;
    });

    localStorage.setItem("owned", JSON.stringify(newOwned));
    alert("復元したよ！");
    location.reload();

  } catch (e) {
    alert("コードが間違ってる！");
  }
}
  (function () {
  const params = new URLSearchParams(location.search);
  const data = params.get("data");
  if (!data) return;

  try {
    let decoded = atob(data);
    let ids = decoded ? decoded.split(",") : [];

    let newOwned = {};
    ids.forEach(id => {
      newOwned[id] = true;
    });

    localStorage.setItem("owned", JSON.stringify(newOwned));

  } catch (e) {
    console.log("URLデータ読み込み失敗");
  }
})();

render();

let newWorker;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then((reg) => {

    reg.onupdatefound = () => {
      newWorker = reg.installing;

      newWorker.onstatechange = () => {
        if (newWorker.state === "installed") {
          if (navigator.serviceWorker.controller) {
            document.getElementById("updateBox").style.display = "block";
          }
        }
      };
    };

  });
}


function updateApp() {
  if (!newWorker) return;

  newWorker.postMessage({ type: "SKIP_WAITING" });
  location.reload();
}
  function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}

function closeMenu() {
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}
