<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" href="images/mc_icon.png">
<link rel="apple-touch-icon" href="images/mc_icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<title>おねがいアイプリカードコレクション</title>

<style>
  /* 共通（PC） */
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 10px;
}

#cardList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  margin: 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  box-sizing: border-box;
  transition: 0.2s;
}

.card img {
  width: 100%;
  height: auto;
}

.card-name {
  font-size: 12px;
  text-align: center;
  margin-top: 5px;
}

.card-info {
  font-size: 11px;
  color: #666;
  font-weight: bold;
}

/* 所持済み */
.card.owned {
  border: 3px solid gold;
  background: #fff8dc;
  box-shadow: 0 0 12px gold;
}

select, input {
  margin: 5px 5px 10px 0;
  padding: 5px;
}

/* ホバー（PCのみ） */
@media (hover: hover) {
  .card:hover {
    transform: scale(1.1);
    z-index: 10;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    cursor: pointer;
  }

  .card:hover img {
    transform: scale(1.05);
  }
}

/* スマホ */
@media (max-width: 600px) {
  body {
    padding: 8px;
  }

  #cardList {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card {
    width: 100%;
    margin: 0;
  }
}

/* メニュー */
#sideMenu {
  position: fixed;
  top: 0;
  left: -280px;
  width: 260px;
  height: 100%;
  background: #fff;
  transition: left 0.3s;
  z-index: 9998;
}

#sideMenu.open {
  left: 0;
}

#app {
  transition: transform 0.3s ease;
}

#app.shift {
  transform: translateX(260px);
}

#menuButton {
  position: fixed;
  top: 35px;
  left: 10px;
  z-index: 9999;
  font-size: 24px;
  cursor: pointer;
}

.header {
  margin-left: 50px;
}

.checkbox-row {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
  align-items: center;
}

/* overlay */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 9997;
}

#overlay.active {
  opacity: 1;
  pointer-events: auto;
  backdrop-filter: blur(6px); /* ←アプリ感UP */
}
  .series-stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.series-stat {
  background: #fff;
  color: #333;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 13px;
  border: 1px solid #ddd;
}
  /* 横並び */
.menu-row {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

/* 縦並び */
.menu-column {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ボタン共通 */
#sideMenu button {
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #f0f0f0;
  cursor: pointer;
  font-size: 14px;
}

/* ホバー */
#sideMenu button:hover {
  background: #ddd;
}

</style>
</head>

<body>

  <div id="overlay"></div>

<div id="sideMenu">
  <h2>メニュー</h2>
  
  <div class="menu-row">
  <button onclick="exportData(); closeMenu()">データ保存</button>
  <button onclick="importData(); closeMenu()">データ読込</button>
</div>

<div class="menu-column">
  <button onclick="location.href='/'">ALLカード</button>
  <button onclick="location.href='?series=1弾'">おねがいアイプリ1だん</button>
  <button onclick="location.href='?series=SP'">スペシャル</button>
</div>
</div>
  
<div id="app">

  <div class="header">
    <div id="menuButton" onclick="toggleMenu()">☰</div>
    <h1>おねがいアイプリカードコレクション</h1>
  </div>
<p>所持率: <span id="rate">0%</span></p>

<div id="seriesStats" class="series-stats"></div>

<select id="seriesFilter" onchange="render()">
  <option value="all">ALL</option>
  <option value="1弾">おねがいアイプリ1だん</option>
<option value="SP">SP</option>
</select>

<select id="filter" onchange="render()">
  <option value="all">全員</option>
  <option value="いのり">いのり</option>
  <option value="あおい">あおい</option>
  <option value="ぐみ">ぐみ</option>
</select>

<select id="rarityFilter" onchange="render()">
  <option value="all">ALL</option>
  <option value="4">★4</option>
  <option value="3">★3</option>
  <option value="2">★2</option>
  <option value="スペシャル">スペシャル</option>
</select>

<input type="text" id="search" placeholder="検索" oninput="render()">

<div class="checkbox-row">
  <label>
    <input type="checkbox" id="onlyUnowned" onchange="toggleFilter('unowned')">
    未所持のみ
  </label>

  <label>
    <input type="checkbox" id="onlyOwned" onchange="toggleFilter('owned')">
    所持済みのみ
  </label>
</div>



<div id="cardList"></div>

<div id="updateBox" style="
  display:none;
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 20px;
  border-radius:10px;
  z-index:9999;
">
  新しいバージョンがあります
  <button onclick="updateApp()" style="margin-left:10px;">更新</button>
</div>

</div> 

<script type="module">
import { cards1 } from './data/series1.js';
import { cardsSP } from './data/seriesSP.js';


const cards = [...cards1, ...cardsSP];

let owned = JSON.parse(localStorage.getItem("owned") || "{}");

function render() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";
 const params = new URLSearchParams(location.search);
const urlSeries = params.get("series");

const select = document.getElementById("seriesFilter");

if (!select.dataset.loaded && urlSeries) {
  select.value = urlSeries;
  select.dataset.loaded = "true";
}

const seriesFilter = select.value;


 const seriesLabel = {
    "1弾": "1だん",
    "SP": "スペシャル"
  };
  const filter = document.getElementById("filter").value;
  const rarityFilter = document.getElementById("rarityFilter").value;
  const search = document.getElementById("search").value.toLowerCase().replace(/\s/g, "");
  const onlyUnowned = document.getElementById("onlyUnowned").checked;
  const onlyOwned = document.getElementById("onlyOwned").checked;
  let totalAll = cards.length;
let countAll = 0;

cards.forEach(card => {
  if (owned[card.id]) countAll++;
});
  let count = 0;
  let total = 0;

  cards.forEach(card => {
    if (seriesFilter !== "all" && card.series !== seriesFilter) return;
    if (filter !== "all" && card.char !== filter) return;
    if (rarityFilter !== "all" && card.rarity != rarityFilter) return;
    if (search) {
  const name = card.name.toLowerCase().replace(/\s/g, "");
  const char = card.char.toLowerCase();
  if (!name.includes(search) && !char.includes(search)) return;
}
    if (onlyUnowned && owned[card.id]) return;
    if (onlyOwned && !owned[card.id]) return;

    total++;

    const div = document.createElement("div");
    div.className = "card";

div.onclick = () => toggle(card.id);

if (owned[card.id]) {
  count++;
  div.classList.add("owned");
}

div.innerHTML =
  (card.img ? '<img src="' + card.img + '">' : '') +
  '<div class="card-info">★' + card.rarity + ' ' + card.char + '</div>' +
  '<div class="card-name">' + card.name + '</div>';


    list.appendChild(div);
  });

const rate = totalAll ? Math.round((countAll / totalAll) * 100) : 0;
document.getElementById("rate").textContent = rate + "% (" + countAll + " / " + totalAll + ")";

// ===== 弾ごとの所持率 =====

const seriesStats = {};

cards.forEach(card => {
  const s = card.series;

  if (!seriesStats[s]) {
    seriesStats[s] = { total: 0, owned: 0 };
  }

  seriesStats[s].total++;

  if (owned[card.id]) {
    seriesStats[s].owned++;
  }
});

const container = document.getElementById("seriesStats");
container.innerHTML = "";

const order = ["1弾", "SP"];

order.forEach(series => {
  if (!seriesStats[series]) return;

  const { total, owned } = seriesStats[series];
  const percent = total ? Math.round((owned / total) * 100) : 0;

  const label = seriesLabel[series] || series;

  const div = document.createElement("div");
  div.className = "series-stat";
  div.textContent = `${label}：${percent}%（${owned} / ${total}）`;

  container.appendChild(div);
});
}
  
function toggle(id) {
  owned[id] = !owned[id];
  localStorage.setItem("owned", JSON.stringify(owned));
  render();
}

function toggleFilter(type) {
  const unowned = document.getElementById("onlyUnowned");
  const ownedCheck = document.getElementById("onlyOwned");

  if (type === "unowned" && unowned.checked) {
    ownedCheck.checked = false;
  }

  if (type === "owned" && ownedCheck.checked) {
    unowned.checked = false;
  }

  render();
}

function exportData() {
  let ownedIds = cards
    .filter(card => owned[card.id])
    .map(card => card.id)
    .join(",");

  if (!ownedIds) {
    alert("まだカードが登録されてないよ！");
    return;
  }

  let encoded = btoa(ownedIds);

  let url = location.origin + location.pathname + "?data=" + encoded;

  navigator.clipboard.writeText(url).then(() => {
    alert("URLコピーしたよ！");
  });
}

function importData() {
  let data = prompt("復元コードまたはURLを貼ってね");
  if (!data) return;

  try {
    // 🔥 URL対応
    if (data.includes("data=")) {
      data = data.split("data=")[1];
    }

    let decoded = atob(data);
    let ids = decoded ? decoded.split(",") : [];

    let newOwned = {};
    ids.forEach(id => {
      newOwned[id] = true;
    });

    localStorage.setItem("owned", JSON.stringify(newOwned));
    alert("復元したよ！");
    location.reload();

  } catch (e) {
    alert("コードが間違ってる！");
  }
}
  (function () {
  const params = new URLSearchParams(location.search);
  const data = params.get("data");
  if (!data) return;

  try {
    let decoded = atob(data);
    let ids = decoded ? decoded.split(",") : [];

    let newOwned = {};
    ids.forEach(id => {
      newOwned[id] = true;
    });

    localStorage.setItem("owned", JSON.stringify(newOwned));

  } catch (e) {
    console.log("URLデータ読み込み失敗");
  }
})();


  if (urlSeries) {
  const select = document.getElementById("seriesFilter");

  const exists = Array.from(select.options).some(
    option => option.value === urlSeries
  );

  if (exists) {
    select.value = urlSeries;
  }
}
if (urlSeries) {
  const select = document.getElementById("seriesFilter");
  select.value = urlSeries;

　history.replaceState({}, "", location.pathname);
}
  
render();

let newWorker;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then((reg) => {

    reg.onupdatefound = () => {
      newWorker = reg.installing;

      newWorker.onstatechange = () => {
        if (newWorker.state === "installed") {
          if (navigator.serviceWorker.controller) {
            document.getElementById("updateBox").style.display = "block";
          }
        }
      };
    };

  });
}


function updateApp() {
  if (!newWorker) return;

  newWorker.postMessage({ type: "SKIP_WAITING" });
  location.reload();
}



const menu = document.getElementById("sideMenu");
const app = document.getElementById("app");
const overlay = document.getElementById("overlay");

function toggleMenu() {
  menu.classList.toggle("open");
  app.classList.toggle("shift");
  overlay.classList.toggle("active");
}

function closeMenu() {
  menu.classList.remove("open");
  app.classList.remove("shift");
  overlay.classList.remove("active");
}

// 背景クリックで閉じる（1回だけ！）
overlay.addEventListener("click", closeMenu);
  
// =======================
// スワイプ操作（overlay対応版）
// =======================
let startX = 0;
let currentX = 0;
let isTouching = false;

document.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;

  const isOpen = menu.classList.contains("open");

  if (startX < 50 || isOpen) {
    isTouching = true;
  }
});

document.addEventListener("touchmove", (e) => {
  if (!isTouching) return;
  currentX = e.touches[0].clientX;
});

document.addEventListener("touchend", () => {
  if (!isTouching) return;

  const diff = currentX - startX;

  // 開く
  if (diff > 80) {
    menu.classList.add("open");
    app.classList.add("shift");
    overlay.classList.add("active");
  }

  // 閉じる
  if (diff < -80) {
    menu.classList.remove("open");
    app.classList.remove("shift");
    overlay.classList.remove("active");
  }

  isTouching = false;
});
  window.toggleMenu = toggleMenu;
window.closeMenu = closeMenu;
window.exportData = exportData;
window.importData = importData;
window.toggleFilter = toggleFilter;
  
</script>

</body>
</html>
