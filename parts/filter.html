<!-- 検索 -->
<input 
  type="text" 
  id="search" 
  placeholder="検索" 
  oninput="render()"
>
 <select 
    id="rarityFilter" 
    onchange="render()"
  >
    <option value="all">すべて</option>
    <option value="2">☆2</option>
    <option value="3">☆3</option>
    <option value="4">☆4</option>
  </select>
</div>

<!-- 所持フィルター -->
<div class="checkbox-row">
  <label>
    <input 
      type="checkbox" 
      id="onlyUnowned" 
      onchange="toggleFilter('unowned')"
    >
    未所持のみ
  </label>

  <label>
    <input 
      type="checkbox" 
      id="onlyOwned" 
      onchange="toggleFilter('owned')"
    >
    所持済みのみ
  </label>
</div>
